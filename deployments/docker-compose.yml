version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ccm
      POSTGRES_USER: ccm
      POSTGRES_PASSWORD: ccm
    ports:
      - "5432:5432"
    volumes:
      - ccm_pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccm -d ccm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  producer:
    build:
      context: ..
      dockerfile: ./deployments/producer.Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      PRODUCER_HTTP_ADDR: ":8082"
    ports:
      - "8082:8082"
    restart: on-failure

  realtime-consumer:
    build:
      context: ..
      dockerfile: ./deployments/realtime-consumer.Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      REALTIME_HTTP_ADDR: ":8080"
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    restart: on-failure

  analyser:
    build:
      context: ..
      dockerfile: ./deployments/analyser.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANALYSER_PG_DSN: postgres://ccm:ccm@postgres:5432/ccm?sslmode=disable
    restart: on-failure

  history-consumer:
    build:
      context: ..
      dockerfile: ./deployments/history-consumer.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      HISTORY_PG_DSN: postgres://ccm:ccm@postgres:5432/ccm?sslmode=disable
    restart: on-failure

  monitoring-api:
    build:
      context: ..
      dockerfile: ./deployments/monitoring-api.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      MONITORING_PG_DSN: postgres://ccm:ccm@postgres:5432/ccm?sslmode=disable
      MONITORING_HTTP_ADDR: ":8081"
      REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ..
      dockerfile: ./deployments/frontend.Dockerfile
    depends_on:
      - monitoring-api
    ports:
      - "3000:80"

volumes:
  ccm_pg_data: {}

