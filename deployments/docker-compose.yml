name: monitoring-platform

services:
  ccm-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ccm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  ccm-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ccm-kafka
    depends_on:
      - ccm-zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ccm-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ccm-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  ccm-postgres:
    image: postgres:16
    container_name: ccm-postgres
    environment:
      POSTGRES_DB: ccm
      POSTGRES_USER: ccm
      POSTGRES_PASSWORD: ccm
    ports:
      - "5432:5432"
    volumes:
      - ccm_pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccm -d ccm"]
      interval: 10s
      timeout: 5s
      retries: 5

  ccm-redis:
    image: redis:7
    container_name: ccm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ccm-producer:
    build:
      context: ..
      dockerfile: ./deployments/producer.Dockerfile
    container_name: ccm-producer
    depends_on:
      ccm-kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: ccm-kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      PRODUCER_HTTP_ADDR: ":8082"
    ports:
      - "8082:8082"
    restart: on-failure

  ccm-realtime-consumer:
    build:
      context: ..
      dockerfile: ./deployments/realtime-consumer.Dockerfile
    container_name: ccm-realtime-consumer
    depends_on:
      ccm-kafka:
        condition: service_healthy
      ccm-redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: ccm-kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      REDIS_ADDR: ccm-redis:6379
    restart: on-failure

  ccm-analyser:
    build:
      context: ..
      dockerfile: ./deployments/analyser.Dockerfile
    container_name: ccm-analyser
    depends_on:
      ccm-postgres:
        condition: service_healthy
    environment:
      ANALYSER_PG_DSN: postgres://ccm:ccm@ccm-postgres:5432/ccm?sslmode=disable
    restart: on-failure

  ccm-history-consumer:
    build:
      context: ..
      dockerfile: ./deployments/history-consumer.Dockerfile
    container_name: ccm-history-consumer
    depends_on:
      ccm-postgres:
        condition: service_healthy
      ccm-kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: ccm-kafka:9092
      KAFKA_CALLS_TOPIC: ccm.calls
      HISTORY_PG_DSN: postgres://ccm:ccm@ccm-postgres:5432/ccm?sslmode=disable
    restart: on-failure

  ccm-monitoring-api:
    build:
      context: ..
      dockerfile: ./deployments/monitoring-api.Dockerfile
    container_name: ccm-monitoring-api
    depends_on:
      ccm-postgres:
        condition: service_healthy
      ccm-redis:
        condition: service_healthy
    environment:
      MONITORING_PG_DSN: postgres://ccm:ccm@ccm-postgres:5432/ccm?sslmode=disable
      MONITORING_HTTP_ADDR: ":8081"
      REDIS_ADDR: ccm-redis:6379
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ccm-dashboard:
    build:
      context: ..
      dockerfile: ./deployments/frontend.Dockerfile
    container_name: ccm-dashboard
    depends_on:
      ccm-monitoring-api:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  ccm_pg_data: {}
